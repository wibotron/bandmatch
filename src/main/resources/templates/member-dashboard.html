<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard Member</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 30px auto; padding: 20px; }
        .profile-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        .field { margin: 10px 0; }
        .label { font-weight: bold; display: inline-block; width: 150px; }
        .btn { display: inline-block; padding: 8px 16px; margin: 5px; text-decoration: none; border-radius: 4px; }
        .btn-primary { background: #1DB954; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .nav { margin: 20px 0; }
        .nav a { margin-right: 10px; }
        .band-list { background: #fff; padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="header">
    <h1>🎸 Dashboard Member</h1>
    <div>
        <span>Halo, <strong th:text="${memberName}"></strong>!</span>
        <a href="/logout" style="margin-left: 15px;">Logout</a>
    </div>
</div>

<div class="nav">
    <a href="/member/portfolio/edit" class="btn btn-primary">✏️ Edit Portofolio</a>
    <a href="/member/explore" class="btn btn-secondary">🔍 Eksplorasi Band</a>
    <a href="/member/offers" class="btn btn-secondary">📨 Tawaran Masuk</a>
</div>

<h2>Profil Saya</h2>
<div class="profile-card">
    <div class="field"><span class="label">Nama Panggung:</span> <span th:text="${member.stageName}">-</span></div>
    <div class="field"><span class="label">Instrumen Utama:</span> <span th:text="${member.primaryInstrument}">-</span></div>
    <div class="field"><span class="label">Email:</span> <span th:text="${member.email}">-</span></div>

    <hr>
    <h3>📋 Portofolio</h3>
    <div class="field"><span class="label">Bio:</span>
        <span th:text="${portfolio.bio != null and portfolio.bio != ''} ? ${portfolio.bio} : 'Belum diisi'"></span>
    </div>
    <div class="field"><span class="label">Skill Set:</span>
        <span th:text="${portfolio.skillSet != null and portfolio.skillSet != ''} ? ${portfolio.skillSet} : 'Belum diisi'"></span>
    </div>
    <div class="field"><span class="label">YouTube:</span>
        <a th:if="${portfolio.youtubeChannel}" th:href="${portfolio.youtubeChannel}" target="_blank">Kunjungi</a>
        <span th:unless="${portfolio.youtubeChannel}">-</span>
    </div>
    <div class="field"><span class="label">Instagram:</span>
        <a th:if="${portfolio.instagramHandle}" th:href="'https://instagram.com/' + ${portfolio.instagramHandle}" target="_blank">@<span th:text="${portfolio.instagramHandle}"></span></a>
        <span th:unless="${portfolio.instagramHandle}">-</span>
    </div>

    <hr>
    <!-- ===== BAGIAN BAND YANG DIIKUTI ===== -->
    <h3>🎤 Bergabung di Band</h3>
    <div th:if="${member.bands.isEmpty()}" style="color: gray;">Belum bergabung dengan band mana pun.</div>
    <div th:unless="${member.bands.isEmpty()}" class="band-list">
        <ul style="list-style: none; padding: 0;">
            <li th:each="band : ${member.bands}" style="padding: 5px 0; border-bottom: 1px solid #eee;">
                🎵 <span th:text="${band.name}"></span>
                <span style="color:gray; font-size:0.9em;">- <span th:text="${band.location}"></span></span>
            </li>
        </ul>
    </div>
</div>
</body>
</html>
