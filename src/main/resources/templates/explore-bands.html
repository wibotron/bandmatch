<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eksplorasi Band</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>
<div class="glow-orb glow-orb-3"></div>
<div class="glow-orb glow-orb-4"></div>
<div class="music-notes">
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">♩</span>
    <span class="note">♬</span>
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">🎸</span>
    <span class="note">🎵</span>
    <span class="note">♩</span>
    <span class="note">🎶</span>
</div>
<div class="eq-container" id="eqContainer"></div>
<canvas class="star-canvas" id="starCanvas"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/member/dashboard" class="navbar-brand">🎸 BandMatch</a>
    <div class="navbar-right">
        <a href="/logout" class="logout-link">Logout</a>
    </div>
</nav>

<div class="container">

    <a href="/member/dashboard" class="back-link">← Kembali ke Dashboard</a>

    <div class="page-header">
        <h1>🔍 Eksplorasi Band</h1>
        <p>Cari band yang sedang membuka rekrutmen sesuai minatmu</p>
    </div>

    <!-- FORM FILTER -->
    <div class="card">
        <form method="get" action="/member/explore" style="display:flex; gap:16px; flex-wrap:wrap; align-items:flex-end;">
            <div class="form-group" style="flex:1; min-width:200px; margin-bottom:0;">
                <label>Genre</label>
                <select name="genre">
                    <option value="">Semua Genre</option>
                    <option th:each="g : ${genres}" th:value="${g}" th:text="${g}"
                            th:selected="${g == selectedGenre}"></option>
                </select>
            </div>

            <div class="form-group" style="flex:1; min-width:240px; margin-bottom:0;">
                <label>Posisi Dibutuhkan</label>
                <select name="position">
                    <option value="">Semua Posisi</option>
                    <optgroup label="🎤 Vokal">
                        <option value="Main Vocalist" th:selected="${'Main Vocalist' == selectedPosition}">Main Vocalist / Lead Vocalist</option>
                        <option value="Backing Vocalist" th:selected="${'Backing Vocalist' == selectedPosition}">Backing Vocalist (Vokal Latar)</option>
                    </optgroup>
                    <optgroup label="🎸 Gitar & Bass">
                        <option value="Lead Guitarist" th:selected="${'Lead Guitarist' == selectedPosition}">Lead Guitarist</option>
                        <option value="Rhythm Guitarist" th:selected="${'Rhythm Guitarist' == selectedPosition}">Rhythm Guitarist</option>
                        <option value="Acoustic Guitarist" th:selected="${'Acoustic Guitarist' == selectedPosition}">Acoustic Guitarist</option>
                        <option value="Bassist" th:selected="${'Bassist' == selectedPosition}">Bassist</option>
                    </optgroup>
                    <optgroup label="🥁 Perkusi / Ritem">
                        <option value="Drummer" th:selected="${'Drummer' == selectedPosition}">Drummer</option>
                        <option value="Percussionist" th:selected="${'Percussionist' == selectedPosition}">Percussionist (Perkusi tambahan)</option>
                    </optgroup>
                    <optgroup label="🎹 Keyboard & Tuts">
                        <option value="Keyboardist" th:selected="${'Keyboardist' == selectedPosition}">Keyboardist</option>
                        <option value="Pianist" th:selected="${'Pianist' == selectedPosition}">Pianist</option>
                        <option value="Synthesizer Player" th:selected="${'Synthesizer Player' == selectedPosition}">Synthesizer Player / Sequencer</option>
                    </optgroup>
                </select>
            </div>

            <div style="display:flex; gap:8px;">
                <button type="submit" class="btn btn-primary">🔍 Cari</button>
                <a href="/member/explore" class="btn btn-secondary">Reset</a>
            </div>
        </form>
    </div>

    <div th:if="${bands.isEmpty()}" class="card empty-state">
        <span class="emoji">🔍</span>
        Tidak ada band yang sesuai dengan filter Anda.
    </div>

    <div th:each="band : ${bands}" class="card">
        <h3 th:text="${band.name}" style="margin-bottom:10px;"></h3>

        <div class="card-row">
            <span class="card-label">Genre</span>
            <span th:if="${#lists.isEmpty(band.genres)}" style="color:var(--muted);">Belum diisi</span>
            <span th:unless="${#lists.isEmpty(band.genres)}">
                <span th:each="g : ${band.genres}" class="tag" th:text="${g}" style="margin-right:4px;"></span>
            </span>
        </div>
        <div class="card-row">
            <span class="card-label">Deskripsi</span>
            <span th:text="${band.description}" style="font-size:0.9rem;"></span>
        </div>
        <div class="card-row" th:if="${band.youtubeProfile}">
            <span class="card-label">YouTube</span>
            <a th:href="${band.youtubeProfile}" target="_blank">▶ Kunjungi</a>
        </div>
        <div class="card-row" th:if="${band.spotifyProfile}">
            <span class="card-label">Spotify</span>
            <a th:href="${band.spotifyProfile}" target="_blank">🎵 Buka</a>
        </div>
        <div class="card-row">
            <span class="card-label">Rekrutmen Aktif</span>
            <span th:text="${#lists.size(band.recruitments)} + ' posisi terbuka'"></span>
        </div>

        <a th:href="@{/member/band/{id}(id=${band.id})}" class="btn btn-primary btn-sm" style="margin-top:12px;">Lihat Detail & Lamar</a>
    </div>

</div>

<script>
    const eqContainer = document.getElementById('eqContainer');
    const colors = ['rgba(139,92,246,VAL)','rgba(29,185,84,VAL)','rgba(220,60,120,VAL)','rgba(52,152,219,VAL)','rgba(255,180,0,VAL)'];
    for (let i = 0; i < 80; i++) {
        const bar = document.createElement('div');
        bar.className = 'eq-bar';
        const c = colors[Math.floor(Math.random() * colors.length)];
        const a = (0.35 + Math.random() * 0.45).toFixed(2);
        bar.style.background = c.replace('VAL', a);
        bar.style.boxShadow = '0 0 8px ' + c.replace('VAL', '0.6');
        bar.style.setProperty('--min-h', (4 + Math.random() * 10) + 'px');
        bar.style.setProperty('--max-h', (20 + Math.random() * 70) + 'px');
        bar.style.animationDuration = (0.4 + Math.random() * 1.2).toFixed(2) + 's';
        bar.style.animationDelay = (Math.random() * 2).toFixed(2) + 's';
        eqContainer.appendChild(bar);
    }
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const stars = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.2, alpha: Math.random(),
        speed: Math.random() * 0.007 + 0.003,
        color: ['rgba(139,92,246,','rgba(29,185,84,','rgba(255,255,255,','rgba(52,152,219,'][Math.floor(Math.random()*4)]
    }));
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.alpha += s.speed;
            if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = s.color + s.alpha.toFixed(2) + ')';
            ctx.fill();
        });
        requestAnimationFrame(animateStars);
    }
    animateStars();
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
