<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Eksplorasi Band</title>
    <style>
        body { font-family: Arial; max-width: 900px; margin: 30px auto; padding: 20px; }
        .band-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .btn { display: inline-block; padding: 6px 12px; text-decoration: none; background: #1DB954; color: white; border-radius: 4px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .filter-form { background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .filter-form select, .filter-form button { padding: 8px; margin-right: 10px; }
        optgroup { font-weight: bold; color: #333; }
    </style>
</head>
<body>
<div class="header">
    <h1>🔍 Eksplorasi Band</h1>
    <a href="/member/dashboard">← Kembali ke Dashboard</a>
</div>

<!-- FORM FILTER -->
<div class="filter-form">
    <form method="get" action="/member/explore">
        <label>Genre:</label>
        <select name="genre">
            <option value="">Semua Genre</option>
            <option th:each="g : ${genres}" th:value="${g}" th:text="${g}"
                    th:selected="${g == selectedGenre}"></option>
        </select>

        <label>Posisi Dibutuhkan:</label>
        <select name="position">
            <option value="">Semua Posisi</option>
            <!-- VOCAL -->
            <optgroup label="🎤 Vokal">
                <option value="Main Vocalist" th:selected="${'Main Vocalist' == selectedPosition}">Main Vocalist / Lead Vocalist</option>
                <option value="Backing Vocalist" th:selected="${'Backing Vocalist' == selectedPosition}">Backing Vocalist (Vokal Latar)</option>
            </optgroup>
            <!-- STRINGS -->
            <optgroup label="🎸 Gitar & Bass">
                <option value="Lead Guitarist" th:selected="${'Lead Guitarist' == selectedPosition}">Lead Guitarist</option>
                <option value="Rhythm Guitarist" th:selected="${'Rhythm Guitarist' == selectedPosition}">Rhythm Guitarist</option>
                <option value="Acoustic Guitarist" th:selected="${'Acoustic Guitarist' == selectedPosition}">Acoustic Guitarist</option>
                <option value="Bassist" th:selected="${'Bassist' == selectedPosition}">Bassist</option>
            </optgroup>
            <!-- PERKUSI -->
            <optgroup label="🥁 Perkusi / Ritem">
                <option value="Drummer" th:selected="${'Drummer' == selectedPosition}">Drummer</option>
                <option value="Percussionist" th:selected="${'Percussionist' == selectedPosition}">Percussionist (Perkusi tambahan)</option>
            </optgroup>
            <!-- KEYBOARD -->
            <optgroup label="🎹 Keyboard & Tuts">
                <option value="Keyboardist" th:selected="${'Keyboardist' == selectedPosition}">Keyboardist</option>
                <option value="Pianist" th:selected="${'Pianist' == selectedPosition}">Pianist</option>
                <option value="Synthesizer Player" th:selected="${'Synthesizer Player' == selectedPosition}">Synthesizer Player / Sequencer</option>
            </optgroup>
        </select>

        <button type="submit" class="btn">🔍 Cari</button>
        <a href="/member/explore" style="margin-left: 10px;">Reset</a>
    </form>
</div>

<div th:if="${bands.isEmpty()}" style="color: gray;">
    Tidak ada band yang sesuai dengan filter Anda.
</div>

<div th:each="band : ${bands}" class="band-card">
    <h3><span th:text="${band.name}"></span></h3>
    <p><strong>Genre:</strong>
        <span th:if="${#lists.isEmpty(band.genres)}" style="color:gray;">Belum diisi</span>
        <span th:unless="${#lists.isEmpty(band.genres)}" th:text="${#strings.arrayJoin(band.genres, ', ')}"></span>
    </p>
    <p><strong>Deskripsi:</strong> <span th:text="${band.description}"></span></p>
    <p th:if="${band.youtubeProfile}"><strong>YouTube:</strong> <a th:href="${band.youtubeProfile}" target="_blank">Kunjungi</a></p>
    <p th:if="${band.spotifyProfile}"><strong>Spotify:</strong> <a th:href="${band.spotifyProfile}" target="_blank">Buka</a></p>
    <p><strong>Rekrutmen Aktif:</strong> <span th:text="${#lists.size(band.recruitments)}"></span> posisi terbuka</p>
    <a th:href="@{/member/band/{id}(id=${band.id})}" class="btn">Lihat Detail & Lamar</a>
</div>
</body>
</html>
