<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrasi BandMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        function toggleFields() {
            const role = document.getElementById('role').value;
            document.getElementById('manager-fields').style.display = role === 'manager' ? 'block' : 'none';
            document.getElementById('member-fields').style.display = role === 'member' ? 'block' : 'none';
        }
    </script>
</head>
<body>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>
<div class="glow-orb glow-orb-3"></div>
<div class="glow-orb glow-orb-4"></div>

<div class="music-notes">
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">♩</span>
    <span class="note">♬</span>
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">🎸</span>
    <span class="note">🎵</span>
    <span class="note">♩</span>
    <span class="note">🎶</span>
</div>

<div class="eq-container" id="eqContainer"></div>
<canvas class="star-canvas" id="starCanvas"></canvas>

<div class="auth-wrapper" style="padding: 40px 20px;">
    <div class="auth-card" style="max-width: 500px;">
        <div class="auth-logo">
            <h1>🎸 BandMatch</h1>
            <p>Daftar & mulai perjalanan musikmu</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form method="post">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" name="name" placeholder="Nama lengkap kamu" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@kamu.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>Daftar sebagai</label>
                <select name="role" id="role" onchange="toggleFields()" required>
                    <option value="manager">Manager Band</option>
                    <option value="member">Band Member (Musisi)</option>
                </select>
            </div>

            <div id="manager-fields">
                <div class="form-group">
                    <label>Jabatan (contoh: Talent Manager)</label>
                    <input type="text" name="companyPosition" placeholder="Jabatan di perusahaan">
                </div>
            </div>

            <div id="member-fields" style="display:none;">
                <div class="form-group">
                    <label>Nama Panggung</label>
                    <input type="text" name="stageName" placeholder="Stage name kamu">
                </div>
                <div class="form-group">
                    <label>Instrumen Utama</label>
                    <select name="primaryInstrument">
                        <option value="">-- Pilih Instrumen Utama --</option>
                        <optgroup label="🎤 Vokal">
                            <option value="Main Vocalist">Main Vocalist / Lead Vocalist</option>
                            <option value="Backing Vocalist">Backing Vocalist (Vokal Latar)</option>
                        </optgroup>
                        <optgroup label="🎸 Gitar & Bass">
                            <option value="Lead Guitarist">Lead Guitarist</option>
                            <option value="Rhythm Guitarist">Rhythm Guitarist</option>
                            <option value="Acoustic Guitarist">Acoustic Guitarist</option>
                            <option value="Bassist">Bassist</option>
                        </optgroup>
                        <optgroup label="🥁 Perkusi / Ritem">
                            <option value="Drummer">Drummer</option>
                            <option value="Percussionist">Percussionist (Perkusi tambahan)</option>
                        </optgroup>
                        <optgroup label="🎹 Keyboard & Tuts">
                            <option value="Keyboardist">Keyboardist</option>
                            <option value="Pianist">Pianist</option>
                            <option value="Synthesizer Player">Synthesizer Player / Sequencer</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:1rem; letter-spacing:0.05em;">
                Daftar Sekarang
            </button>
        </form>

        <div class="auth-footer">
            Sudah punya akun? <a href="/login">Login di sini</a>
        </div>
    </div>
</div>

<script>
    const eqContainer = document.getElementById('eqContainer');
    const colors = ['rgba(139,92,246,VAL)','rgba(29,185,84,VAL)','rgba(220,60,120,VAL)','rgba(52,152,219,VAL)','rgba(255,180,0,VAL)'];
    for (let i = 0; i < 80; i++) {
        const bar = document.createElement('div');
        bar.className = 'eq-bar';
        const c = colors[Math.floor(Math.random() * colors.length)];
        const a = (0.35 + Math.random() * 0.45).toFixed(2);
        bar.style.background = c.replace('VAL', a);
        bar.style.boxShadow = '0 0 8px ' + c.replace('VAL', '0.6');
        bar.style.setProperty('--min-h', (4 + Math.random() * 10) + 'px');
        bar.style.setProperty('--max-h', (20 + Math.random() * 70) + 'px');
        bar.style.animationDuration = (0.4 + Math.random() * 1.2).toFixed(2) + 's';
        bar.style.animationDelay = (Math.random() * 2).toFixed(2) + 's';
        eqContainer.appendChild(bar);
    }

    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const stars = Array.from({length: 120}, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.2, alpha: Math.random(),
        speed: Math.random() * 0.008 + 0.003,
        color: ['rgba(139,92,246,','rgba(29,185,84,','rgba(255,255,255,','rgba(52,152,219,'][Math.floor(Math.random()*4)]
    }));
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.alpha += s.speed;
            if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = s.color + s.alpha.toFixed(2) + ')';
            ctx.fill();
        });
        requestAnimationFrame(animateStars);
    }
    animateStars();
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
