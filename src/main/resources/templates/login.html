<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login BandMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>
<div class="glow-orb glow-orb-3"></div>
<div class="glow-orb glow-orb-4"></div>

<div class="music-notes">
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">♩</span>
    <span class="note">♬</span>
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">🎸</span>
    <span class="note">🎵</span>
    <span class="note">♩</span>
    <span class="note">🎶</span>
</div>

<div class="eq-container" id="eqContainer"></div>
<canvas class="star-canvas" id="starCanvas"></canvas>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>🎸 BandMatch</h1>
            <p>Platform musisi & band Indonesia</p>
        </div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@kamu.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:1rem; letter-spacing:0.05em;">Login</button>
        </form>
        <div class="auth-footer">
            Belum punya akun? <a href="/register">Daftar di sini</a>
        </div>
    </div>
</div>

<script>
    // ===== EQUALIZER BARS =====
    const eqContainer = document.getElementById('eqContainer');
    const barCount = 80;
    const colors = [
        'rgba(139,92,246,VAL)', 'rgba(29,185,84,VAL)',
        'rgba(220,60,120,VAL)', 'rgba(52,152,219,VAL)', 'rgba(255,180,0,VAL)'
    ];
    for (let i = 0; i < barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'eq-bar';
        const colorBase = colors[Math.floor(Math.random() * colors.length)];
        const alpha = (0.35 + Math.random() * 0.45).toFixed(2);
        bar.style.background = colorBase.replace('VAL', alpha);
        bar.style.boxShadow = '0 0 8px ' + colorBase.replace('VAL', '0.6');
        const minH = 4 + Math.random() * 10;
        const maxH = 20 + Math.random() * 70;
        bar.style.setProperty('--min-h', minH + 'px');
        bar.style.setProperty('--max-h', maxH + 'px');
        bar.style.animationDuration = (0.4 + Math.random() * 1.2).toFixed(2) + 's';
        bar.style.animationDelay = (Math.random() * 2).toFixed(2) + 's';
        eqContainer.appendChild(bar);
    }

    // ===== STAR PARTICLES =====
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = Array.from({length: 120}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.2,
        alpha: Math.random(),
        speed: Math.random() * 0.008 + 0.003,
        color: ['rgba(139,92,246,', 'rgba(29,185,84,', 'rgba(255,255,255,', 'rgba(52,152,219,'][Math.floor(Math.random()*4)]
    }));

    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.alpha += s.speed;
            if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = s.color + s.alpha.toFixed(2) + ')';
            ctx.fill();
        });
        requestAnimationFrame(animateStars);
    }
    animateStars();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
