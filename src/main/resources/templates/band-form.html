<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Band</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .genre-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .genre-grid label {
            display: flex; align-items: center; gap: 8px;
            font-weight: normal; text-transform: none; letter-spacing: normal;
            cursor: pointer; padding: 8px 10px;
            background: rgba(30,30,53,0.6); border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.88rem; color: var(--text); transition: border-color 0.2s;
        }
        .genre-grid label:hover { border-color: var(--green); }
        .genre-grid input[type="checkbox"] { width: auto; accent-color: var(--green); margin: 0; }
    </style>
</head>
<body>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>
<div class="glow-orb glow-orb-3"></div>
<div class="glow-orb glow-orb-4"></div>
<div class="music-notes">
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">♩</span>
    <span class="note">♬</span>
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">🎸</span>
    <span class="note">🎵</span>
    <span class="note">♩</span>
    <span class="note">🎶</span>
</div>
<div class="eq-container" id="eqContainer"></div>
<canvas class="star-canvas" id="starCanvas"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/manager/dashboard" class="navbar-brand">🎸 BandMatch</a>
    <div class="navbar-right">
        <a href="/logout" class="logout-link">Logout</a>
    </div>
</nav>

<div class="container-sm">

    <a href="/manager/dashboard" class="back-link">← Kembali ke Dashboard</a>

    <div class="page-header">
        <h1 th:text="${band.id == null} ? '🎸 Buat Band Baru' : '🎸 Edit Band'">Form Band</h1>
        <p>Lengkapi informasi band agar mudah ditemukan musisi</p>
    </div>

    <div class="card">
        <form th:action="${band.id == null} ? '/manager/band/create' : '/manager/band/edit/' + ${band.id}"
              th:object="${band}"
              method="post">

            <div class="form-group">
                <label>Nama Band *</label>
                <input type="text" th:field="*{name}" required placeholder="Contoh: The Rolling Stones">
            </div>

            <div class="form-group">
                <label>Genre * (centang semua yang sesuai)</label>
                <div class="genre-grid">
                    <label><input type="checkbox" th:field="*{genres}" value="Rock"> Rock</label>
                    <label><input type="checkbox" th:field="*{genres}" value="Pop"> Pop</label>
                    <label><input type="checkbox" th:field="*{genres}" value="Jazz"> Jazz</label>
                    <label><input type="checkbox" th:field="*{genres}" value="Metal"> Metal</label>
                    <label><input type="checkbox" th:field="*{genres}" value="Blues"> Blues</label>
                    <label><input type="checkbox" th:field="*{genres}" value="Funk"> Funk</label>
                    <label><input type="checkbox" th:field="*{genres}" value="Reggae"> Reggae</label>
                    <label><input type="checkbox" th:field="*{genres}" value="Dangdut"> Dangdut</label>
                    <label><input type="checkbox" th:field="*{genres}" value="Keroncong"> Keroncong</label>
                    <label><input type="checkbox" th:field="*{genres}" value="Lainnya"> Lainnya</label>
                </div>
            </div>

            <div class="form-group">
                <label>Deskripsi</label>
                <textarea th:field="*{description}" rows="3" placeholder="Deskripsi singkat band..."></textarea>
            </div>

            <div class="form-group">
                <label>Link Profil YouTube</label>
                <input type="url" th:field="*{youtubeProfile}" placeholder="https://www.youtube.com/@namaband">
            </div>

            <div class="form-group">
                <label>Link Profil Spotify</label>
                <input type="url" th:field="*{spotifyProfile}" placeholder="https://open.spotify.com/artist/xxx">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:1rem; letter-spacing:0.05em;">
                💾 Simpan Band
            </button>
        </form>
    </div>

</div>

<script>
    const eqContainer = document.getElementById('eqContainer');
    const colors = ['rgba(139,92,246,VAL)','rgba(29,185,84,VAL)','rgba(220,60,120,VAL)','rgba(52,152,219,VAL)','rgba(255,180,0,VAL)'];
    for (let i = 0; i < 80; i++) {
        const bar = document.createElement('div');
        bar.className = 'eq-bar';
        const c = colors[Math.floor(Math.random() * colors.length)];
        const a = (0.35 + Math.random() * 0.45).toFixed(2);
        bar.style.background = c.replace('VAL', a);
        bar.style.boxShadow = '0 0 8px ' + c.replace('VAL', '0.6');
        bar.style.setProperty('--min-h', (4 + Math.random() * 10) + 'px');
        bar.style.setProperty('--max-h', (20 + Math.random() * 70) + 'px');
        bar.style.animationDuration = (0.4 + Math.random() * 1.2).toFixed(2) + 's';
        bar.style.animationDelay = (Math.random() * 2).toFixed(2) + 's';
        eqContainer.appendChild(bar);
    }
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const stars = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.2, alpha: Math.random(),
        speed: Math.random() * 0.007 + 0.003,
        color: ['rgba(139,92,246,','rgba(29,185,84,','rgba(255,255,255,','rgba(52,152,219,'][Math.floor(Math.random()*4)]
    }));
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.alpha += s.speed;
            if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = s.color + s.alpha.toFixed(2) + ')';
            ctx.fill();
        });
        requestAnimationFrame(animateStars);
    }
    animateStars();
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
