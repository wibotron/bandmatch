<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Daftar Musisi</title>
    <style>
        body { font-family: Arial; max-width: 900px; margin: 30px auto; padding: 20px; }
        .musician { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .btn { padding: 5px 10px; background: #1DB954; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
<h1>🎤 Daftar Musisi</h1>
<a href="/manager/dashboard">← Kembali ke Dashboard</a>
<div th:if="${param.success}" style="color: green; margin: 10px 0;">✅ Offer berhasil dikirim!</div>

<div th:each="member : ${members}" class="musician">
    <h3><span th:text="${member.name}"></span> (<span th:text="${member.stageName}"></span>)</h3>
    <p><strong>Instrumen:</strong> <span th:text="${member.primaryInstrument}"></span></p>
    <p><strong>Skill:</strong> <span th:text="${member.portfolio.skillSet}"></span></p>
    <a th:href="@{/manager/offer/send/{id}(id=${member.id})}" class="btn">📨 Kirim Offer</a>
</div>
</body>
</html>
