<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daftar Musisi</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>
<div class="glow-orb glow-orb-3"></div>
<div class="glow-orb glow-orb-4"></div>
<div class="music-notes">
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">♩</span>
    <span class="note">♬</span>
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">🎸</span>
    <span class="note">🎵</span>
    <span class="note">♩</span>
    <span class="note">🎶</span>
</div>
<div class="eq-container" id="eqContainer"></div>
<canvas class="star-canvas" id="starCanvas"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/manager/dashboard" class="navbar-brand">🎸 BandMatch</a>
    <div class="navbar-right">
        <a href="/logout" class="logout-link">Logout</a>
    </div>
</nav>

<div class="container">

    <a href="/manager/dashboard" class="back-link">← Kembali ke Dashboard</a>

    <div class="page-header">
        <h1>🎤 Daftar Musisi</h1>
        <p>Temukan musisi yang cocok untuk band atau proyekmu</p>
    </div>

    <div th:if="${param.success}" class="alert alert-success">✅ Offer berhasil dikirim!</div>

    <div th:if="${#lists.isEmpty(members)}" class="card empty-state">
        <span class="emoji">🎤</span>
        Belum ada musisi yang terdaftar.
    </div>

    <div th:each="member : ${members}" class="card">
        <h3 th:text="${member.name} + ' (' + ${member.stageName} + ')'" style="margin-bottom:10px;"></h3>
        <div class="card-row">
            <span class="card-label">Instrumen</span>
            <span class="tag" th:text="${member.primaryInstrument}">-</span>
        </div>
        <div class="card-row">
            <span class="card-label">Skill</span>
            <span th:text="${member.portfolio.skillSet != null and member.portfolio.skillSet != ''} ? ${member.portfolio.skillSet} : 'Belum diisi'" style="font-size:0.9rem;">-</span>
        </div>
        <a th:href="@{/manager/offer/send/{id}(id=${member.id})}" class="btn btn-primary btn-sm" style="margin-top:12px;">📨 Kirim Offer</a>
    </div>

</div>

<script>
    const eqContainer = document.getElementById('eqContainer');
    const colors = ['rgba(139,92,246,VAL)','rgba(29,185,84,VAL)','rgba(220,60,120,VAL)','rgba(52,152,219,VAL)','rgba(255,180,0,VAL)'];
    for (let i = 0; i < 80; i++) {
        const bar = document.createElement('div');
        bar.className = 'eq-bar';
        const c = colors[Math.floor(Math.random() * colors.length)];
        const a = (0.35 + Math.random() * 0.45).toFixed(2);
        bar.style.background = c.replace('VAL', a);
        bar.style.boxShadow = '0 0 8px ' + c.replace('VAL', '0.6');
        bar.style.setProperty('--min-h', (4 + Math.random() * 10) + 'px');
        bar.style.setProperty('--max-h', (20 + Math.random() * 70) + 'px');
        bar.style.animationDuration = (0.4 + Math.random() * 1.2).toFixed(2) + 's';
        bar.style.animationDelay = (Math.random() * 2).toFixed(2) + 's';
        eqContainer.appendChild(bar);
    }
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const stars = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.2, alpha: Math.random(),
        speed: Math.random() * 0.007 + 0.003,
        color: ['rgba(139,92,246,','rgba(29,185,84,','rgba(255,255,255,','rgba(52,152,219,'][Math.floor(Math.random()*4)]
    }));
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.alpha += s.speed;
            if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = s.color + s.alpha.toFixed(2) + ')';
            ctx.fill();
        });
        requestAnimationFrame(animateStars);
    }
    animateStars();
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
